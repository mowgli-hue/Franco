name: Release Desktop

on:
  push:
    tags:
      - "v*"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: write

jobs:
  build-macos:
    name: Build macOS DMG
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Tool versions
        run: |
          node -v
          npm -v

      - name: Build macOS package
        run: npm run build:desktop -- --mac dmg --publish never

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: desktop-macos
          path: |
            release/*.dmg
            release/*.blockmap
            release/latest-mac.yml
          if-no-files-found: error

      - name: Upload macOS debug files
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: desktop-macos-debug
          path: |
            release/builder-debug.yml
            release/builder-effective-config.yaml
          if-no-files-found: ignore

  build-windows:
    name: Build Windows EXE
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Tool versions
        run: |
          node -v
          npm -v

      - name: Build Windows installer
        run: npm run build:desktop -- --win nsis --publish never

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: desktop-windows
          path: |
            release/*.exe
            release/*.blockmap
            release/latest.yml
          if-no-files-found: error

      - name: Upload Windows debug files
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: desktop-windows-debug
          path: |
            release/builder-debug.yml
            release/builder-effective-config.yaml
          if-no-files-found: ignore

  publish-release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs:
      - build-macos
      - build-windows
    steps:
      - name: Download macOS artifacts
        uses: actions/download-artifact@v4
        with:
          name: desktop-macos
          path: release

      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: desktop-windows
          path: release

      - name: Create GitHub Release and upload assets
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            release/*.dmg
            release/*.exe
            release/*.blockmap
            release/latest*.yml
